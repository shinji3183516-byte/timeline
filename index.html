<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高岡工場 60th Anniversary Timeline</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <main class="page">
    <header class="header">
      <div class="title-area">
        <img
          src="images/factory/toyotamark.jpg?v=20260612"
          alt="トヨタマーク"
          class="mark"
        />
        <div>
          <h1><span>高岡工場 60th Anniversary</span> TIMELINE 1966-2026</h1>
          
        </div>
      </div>
      <div class="header-actions" aria-label="年表操作">
        <div class="speed-control" aria-label="年表の速度切替">
          <button class="speed-button" type="button" data-speed="verySlow">より遅い</button>
          <button class="speed-button" type="button" data-speed="slow">遅い</button>
          <button class="speed-button active" type="button" data-speed="normal">普通</button>
        </div>
        <div class="play-control" aria-label="年表の再生操作">
          <button id="pauseButton" class="control-button" type="button">停止</button>
          <button id="playButton" class="control-button" type="button">再開</button>
        </div>
        <!-- 高岡60周年公式ロゴ　無断使用・転載・転用禁止 -->
        <img
          src="images/factory/60thLOGO.png" 
          alt="高岡工場60周年ロゴ"
          class="archive-logo"
        />
      </div>
    </header>

    <section class="timeline-frame" id="timelineFrame" aria-label="自動スクロール年表">
      <div class="center-line" aria-hidden="true"></div>
      <div class="track-mask">
        <div class="timeline-track" id="timelineTrack"></div>
      </div>
      <p class="pause-note">年表にマウスを乗せると、年表と下の表示が同時に止まります</p>
    </section>

    <section class="main-card">
      <div class="left-panel">
        <p class="label">SELECTED YEAR</p>
        <div class="year-line">
          <span class="big-year" id="selectedYear">1966</span>
          <span class="era-badge" id="selectedEra">昭和41年</span>
        </div>
        <h2 id="selectedTitle">高岡工場スタート</h2>
        <button class="photo-link" id="photoLink" type="button" data-placeholder="メイン写真を追加してください">
          <img id="mainPhoto" alt="選択された年代の写真" />
          <span>画像を開く</span>
        </button>
      </div>

      <div class="right-area">
        <div class="visual-title-box">
          <div id="visualTitle">PLANT</div>
          <p>中央ラインの年代と下表示を連動</p>
        </div>

        <details class="editor-panel">
          <summary>
            <span>写真・文章を一時追加</span>
            <small id="editorYearLabel">1966年に追加</small>
          </summary>
          <div class="editor-grid">
            <label>
              追加先
              <select id="editorTarget">
                <option value="car">車紹介</option>
                <option value="plant">工場の出来事</option>
                <option value="society">社会の出来事</option>
              </select>
            </label>
            <label>
              写真追加（最大3枚）
              <input id="editorImages" type="file" accept="image/*" multiple />
            </label>
            <label class="editor-text-label">
              文章追加
              <textarea id="editorText" rows="2" placeholder="選択中の年代に追加する文章"></textarea>
            </label>
            <div class="editor-buttons">
              <button id="addEditorText" type="button">文章を追加</button>
              <button id="clearEditorAdditions" type="button">一時追加をリセット</button>
            </div>
          </div>
          <p class="editor-note">
            アップローダーは、このブラウザ内の一時追加です。正式保存する場合は画像を images フォルダへ入れ、script.js の content に画像パスを追加してください。
          </p>
        </details>

        <div class="event-grid">
          <article>
            <div id="carContent" class="article-content"></div>
          </article>

          <article>
            <div id="factoryContent" class="article-content"></div>
          </article>

          <article>
            <div id="societyContent" class="article-content"></div>
          </article>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
